<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dāvanu Karte • Premium dāvanas</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="light">
  <!-- NAVIGĀCIJA -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <i class="fa-solid fa-gift"></i>
        <span>Dāvanu Karte</span>
      </div>
      <div class="nav-right">
        <button id="theme-toggle" class="icon-btn">
          <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>
        <button id="cart-btn" class="icon-btn relative">
          <i class="fa-solid fa-shopping-cart"></i>
          <span id="cart-count" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="heading">Dāvini emocijas,<br>kas paliek atmiņā</h1>
      <p class="hero-subtitle">Skaistas un personiskas digitālās dāvanu kartes vienā mirklī</p>
      <button onclick="document.getElementById('amount-section').scrollIntoView({ behavior: 'smooth' })" 
              class="btn-primary">
        Izvēlēties dāvanu
      </button>
    </div>
  </header>

  <main class="main-content">
    <!-- SUMMAS IZVĒLE -->
    <section id="amount-section" class="section">
      <h2 class="section-title">Izvēlies dāvanas summu</h2>
      <div class="amount-grid" id="amount-grid"></div>

      <div class="custom-amount">
        <label for="custom-amount">Vai ievadi savu summu (€)</label>
        <div class="input-group">
          <input type="number" id="custom-amount" min="5" value="50">
          <button onclick="addCustomToCart()" class="btn-add">Pievienot</button>
        </div>
      </div>
    </section>

    <!-- PERSONALIZĀCIJA -->
    <section class="section">
      <h2 class="section-title">Personalizē savu dāvanu karti</h2>
      <div class="personalization-grid">
        <div class="form-container">
          <div class="form-group">
            <label>Saņēmēja vārds</label>
            <input type="text" id="recipient-name" placeholder="Anna Kalniņa">
          </div>
          
          <div class="form-group">
            <label>Personīgs novēlējums</label>
            <textarea id="message" rows="4" placeholder="Novēlu Tev siltu un priecīgu dienu..."></textarea>
          </div>

          <div class="form-group">
            <label>Izvēlies kartes dizainu</label>
            <div class="design-options" id="design-options"></div>
          </div>

          <button onclick="addToCart()" class="btn-primary w-full">Pievienot grozam</button>
        </div>

        <div class="preview-container">
          <h3>Kā karte izskatīsies</h3>
          <div id="preview-card" class="preview-card"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Modāļi -->
  <div id="cart-modal" class="modal">...</div>
  <div id="checkout-modal" class="modal">...</div>
  <div id="success-screen" class="success-screen hidden">...</div>

  <script src="script.js"></script>
</body>
</html>
