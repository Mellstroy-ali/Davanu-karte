<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dāvanu kartes iegāde</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎁 Hero Section -->
    <section class="hero">
        <h1>🎁 Ideālā dāvanu karte jebkuram gadījumam</h1>
        <p>Personalizē dāvanu, izvēlies dizainu un nosūti digitāli.</p>
    </section>

    <!-- 🛍 Main Product Section -->
    <div class="container">
        <h1>Dāvanu kartes iegāde</h1>

        <p>
            Izvēlies dāvanu kartes summu un iegādājies to tiešsaistē. 
            Minimālā summa ir 10 €.
        </p>

        <label for="amount">Ievadi summu (€):</label>
        <input type="number" id="amount" placeholder="Piemēram, 25">

        <button id="buyBtn">Iegādāties</button>

        <p id="result"></p>

        <!-- 🎨 Papildu funkcijas -->
        <div class="extras">

            <label for="designSelect">🎨 Izvēlies dizainu:</label>
            <select id="designSelect">
                <option value="Klasiska">Klasiska</option>
                <option value="Dzimšanas diena">Dzimšanas diena</option>
                <option value="Svētku">Svētku</option>
            </select>

            <label for="recipientName">👤 Saņēmēja vārds:</label>
            <input type="text" id="recipientName" placeholder="Ievadi vārdu">

            <label for="recipientEmail">📧 Saņēmēja e-pasts:</label>
            <input type="email" id="recipientEmail" placeholder="example@email.com">

            <label for="promoCode">🏷️ Promo kods:</label>
            <input type="text" id="promoCode" placeholder="SALE10">

            <button id="clearCartBtn">🗑️ Notīrīt grozu</button>

        </div>
    </div>

    <!-- ⭐ Features -->
    <section class="features">
        <div class="feature-box">⚡ Ātra piegāde</div>
        <div class="feature-box">🔒 Drošs maksājums</div>
        <div class="feature-box">💌 Personalizācija</div>
    </section>

    <!-- 📌 Footer -->
    <footer class="footer">
        <p>© 2026 GiftStore | Premium dāvanu kartes</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
