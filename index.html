<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dāvanu Karte • Premium dāvanas</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="light">
  <!-- NAVIGĀCIJA -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <i class="fa-solid fa-gift"></i>
        <span>Dāvanu Karte</span>
      </div>
      <div class="nav-right">
        <button id="theme-toggle" class="icon-btn" aria-label="Mainīt motīvu">
          <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>
        <button id="cart-btn" class="icon-btn relative">
          <i class="fa-solid fa-shopping-cart"></i>
          <span id="cart-count" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-content">
      <h1 class="heading">Ideāla dāvana<br>vienā klikšķī</h1>
      <p class="hero-subtitle">Izvēlies summu, personalizē un dāvini ar sirdi</p>
      <button onclick="document.getElementById('amount-section').scrollIntoView({ behavior: 'smooth' })" 
              class="btn-primary">
        Izvēlēties summu
      </button>
    </div>
  </header>

  <main class="main-content">
    <!-- SUMMAS IZVĒLE -->
    <section id="amount-section" class="section">
      <h2 class="section-title">Izvēlies dāvanas summu</h2>
      <div class="amount-grid" id="amount-grid"></div>

      <div class="custom-amount">
        <label for="custom-amount">Vai ievadi savu summu (€)</label>
        <div class="input-group">
          <input type="number" id="custom-amount" min="5" value="50">
          <button onclick="addCustomToCart()" class="btn-add">Pievienot</button>
        </div>
      </div>
    </section>

    <!-- PERSONALIZĀCIJA -->
    <section class="section">
      <h2 class="section-title">Personalizē dāvanu karti</h2>
      <div class="personalization-grid">
        <!-- Forma -->
        <div class="form-container">
          <div class="form-group">
            <label>Saņēmēja vārds</label>
            <input type="text" id="recipient-name" placeholder="Anna Kalniņa">
          </div>
          
          <div class="form-group">
            <label>Personīgs novēlējums</label>
            <textarea id="message" rows="4" placeholder="Novēlu Tev daudz prieka un siltuma..."></textarea>
          </div>

          <div class="form-group">
            <label>Izvēlies dizainu</label>
            <div class="design-options" id="design-options"></div>
          </div>

          <button onclick="addToCart()" class="btn-primary w-full">Pievienot grozam</button>
        </div>

        <!-- Priekšskatījums -->
        <div class="preview-container">
          <h3>Priekšskatījums</h3>
          <div id="preview-card" class="preview-card"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- GROZS -->
  <div id="cart-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Tavs grozs</h3>
        <button onclick="closeCart()" class="close-btn">✕</button>
      </div>
      <div id="cart-items" class="cart-items"></div>
      
      <div class="cart-footer">
        <div class="total">
          <span>Kopā:</span>
          <span id="cart-total">0.00€</span>
        </div>
        <input type="text" id="promo-code" placeholder="Promo kods" class="promo-input">
        <button onclick="applyPromoCode()" class="btn-secondary">Lietot kodu</button>
        <button onclick="proceedToCheckout()" class="btn-primary w-full">Turpināt uz apmaksu</button>
      </div>
    </div>
  </div>

  <!-- CHECKOUT -->
  <div id="checkout-modal" class="modal">
    <div class="modal-content checkout-content">
      <div class="modal-header">
        <h3>Maksājuma informācija</h3>
        <button onclick="closeCheckout()" class="close-btn">✕</button>
      </div>
      <div class="checkout-form">
        <input type="text" id="card-number" placeholder="Kartes numurs" maxlength="19" onkeyup="formatCardNumber(this)">
        <div class="grid-2">
          <input type="text" id="expiry" placeholder="MM/GG" maxlength="5">
          <input type="text" id="cvv" placeholder="CVV" maxlength="4">
        </div>
        <button onclick="processPayment()" class="btn-primary w-full mt-6">Veikt maksājumu</button>
      </div>
    </div>
  </div>

  <!-- VEIKSMES EKRĀNS -->
  <div id="success-screen" class="success-screen hidden">
    <div class="success-content">
      <i class="fa-solid fa-check-circle success-icon"></i>
      <h2>Paldies!</h2>
      <p>Maksājums veiksmīgi veikts</p>
      <button onclick="restartSite()" class="btn-primary">Atgriezties sākumā</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
